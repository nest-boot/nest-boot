name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/verify.yml
    permissions:
      contents: write
      id-token: write
    with:
      fetch-depth: 0
      release: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
